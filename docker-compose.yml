services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - LLM_BASE_URL=http://llm-server:8080
      - LLM_TIMEOUT=30
    mem_limit: 2g
    restart: unless-stopped

  llm-server:
    profiles:
      - llm
    build:
      context: .
      dockerfile: Dockerfile.llm
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    mem_limit: 6g
    restart: unless-stopped
